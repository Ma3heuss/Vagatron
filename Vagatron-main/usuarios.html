<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários - VAGATRON</title>
    <link rel="stylesheet" href="css/usuarios.css">
</head>

<body>

    <div class="sidebar">

        <h1 class="logo">VAGATRON</h1>

        <p class="subtitulo">
            Sistema de Estacionamento
        </p>

        <img src="imagens/UGB.png" class="ugb">

        <nav>

            <!-- Coloque a imagem da CASA -->
            <a href="dashboard.html">
                <img src="imagens/casa-preta.png" class="icone">
                Dashboard
            </a>

            <!-- Coloque a imagem do CARRO -->
            <a href="veiculos.html">
                <img src="imagens/carro-preto.png" class="icone">
                Veículos
            </a>

            <!-- Coloque a imagem de ENTRADA -->
            <a href="entrada-saida.html">
                <img src="imagens/seta-preta.png" class="icone">
                Entrada e Saída
            </a>

            <!-- Coloque a imagem de RELATÓRIO -->
            <a href="relatorios.html">
                <img src="imagens/relatorio.png" class="icone">
                Relatórios
            </a>

            <!-- Coloque a imagem de USUÁRIO -->
            <a href="usuarios.html" class="ativo">
                <img src="imagens/usuario.png" class="icone">
                Usuários
            </a>

            <!-- Coloque a imagem da ENGRENAGEM -->
            <a href="configuracoes.html">
                <img src="imagens/configuracao.png" class="icone">
                Configurações
            </a>

        </nav>

    </div>

    <div class="conteudo">

        <div class="card">

            <div class="cabecalho">

                <h1>Usuários</h1>

            </div>

            <div class="formulario">

                <input type="text" id="matricula" placeholder="Matrícula">

                <input type="text" id="nome" placeholder="Nome">

                <input type="email" id="email" placeholder="Email">

                <select id="cargo">
                    <option value="">Cargo</option>
                    <option>Aluno</option>
                    <option>Professor</option>
                    <option>Funcionário</option>
                    <option>Administrador</option>
                </select>

                <button onclick="adicionarUsuario()">
                    Salvar
                </button>

            </div>

            <table>

                <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Cargo</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaUsuarios">

                </tbody>

            </table>

        </div>

    </div>

    <script src="js/usuarios.js"></script>

</body>

</html>
