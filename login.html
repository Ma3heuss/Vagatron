<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vagatron</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">

        <div class="lado-esquerdo">

            <h1>VAGA<span>TRON</span></h1>
            <p class="subtitulo">SISTEMA DE ESTACIONAMENTO</p>

            <div class="logo">
                <h2>UGB</h2>
                <p>VOLTA REDONDA</p>
            </div>

            <div class="texto">
                <h3>Bem-vindo!</h3>
                <p>Faça login para acessar o sistema.</p>
            </div>

            <form>

                <label>E-mail</label>
                <input type="email" placeholder="Digite seu e-mail">

                <label>Senha</label>
                <input type="password" placeholder="Digite sua senha">

                <div class="opcoes">
                    <label>
                        <input type="checkbox">
                        Lembrar-me
                    </label>

                    <a href="#">Esqueceu sua senha?</a>
                </div>

                <button type="submit">
                    Entrar
                </button>

            </form>

        </div>

        <div class="lado-direito">
            <img src="imagens/imagemcarro.png" alt="Imagem estacionamento">
        </div>

    </div>

</body>
</html>
